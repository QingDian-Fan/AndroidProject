/*application版本控制*/
def build_versions = [:]
build_versions.min_sdk = 24
build_versions.target_sdk = 35
build_versions.compile_sdk = 35
build_versions.tool_version = "30.0.2"
build_versions.version_code = 100
build_versions.version_name = "1.0.0"  //android版本信息 alpha beta rc release
build_versions.applicationId = "com.dian.demo"
ext.build_versions = build_versions

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withInputStream { localProperties.load(it) }
}

ext.readLocalOrEnv = { String localKey, String envKey, String defaultValue = "" ->
    def value = localProperties.getProperty(localKey)
    if (value == null || value.toString().trim().isEmpty()) {
        value = System.getenv(envKey)
    }
    return value == null ? defaultValue : value.toString().trim()
}

ext.buildConfigString = { String value ->
    return "\"" + value.replace("\\", "\\\\").replace("\"", "\\\"") + "\""
}

//签名文件配置
def build_key = [:]
build_key.keystoreReleaseFilepath = readLocalOrEnv("signing.release.storeFile", "SIGNING_RELEASE_STORE_FILE", "../keystore/project.keystore")
build_key.keystoreDebugFilepath = readLocalOrEnv("signing.debug.storeFile", "SIGNING_DEBUG_STORE_FILE", "../keystore/debug.keystore")
build_key.keystoreAlias = readLocalOrEnv("signing.release.keyAlias", "SIGNING_RELEASE_KEY_ALIAS")
build_key.debugKeystoreAlias = readLocalOrEnv("signing.debug.keyAlias", "SIGNING_DEBUG_KEY_ALIAS")
build_key.keystoreAliasPSW = readLocalOrEnv("signing.release.keyPassword", "SIGNING_RELEASE_KEY_PASSWORD")
build_key.keystorePSW = readLocalOrEnv("signing.release.storePassword", "SIGNING_RELEASE_STORE_PASSWORD")
build_key.debugKeystoreAliasPSW = readLocalOrEnv("signing.debug.keyPassword", "SIGNING_DEBUG_KEY_PASSWORD")
build_key.debugKeystorePSW = readLocalOrEnv("signing.debug.storePassword", "SIGNING_DEBUG_STORE_PASSWORD")
ext.build_key = build_key

