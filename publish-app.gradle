import groovy.json.JsonBuilder
import groovy.json.JsonSlurper
import org.apache.tools.ant.taskdefs.condition.Os

//https://www.pgyer.com/doc/view/api_upload
ext {
    //蒲公英
    pgyer_api_key = readLocalOrEnv("pgyer.apiKey", "PGYER_API_KEY")
    pgyer_user_key = readLocalOrEnv("pgyer.userKey", "PGYER_USER_KEY")
    // 新版上传流程: 获取COS Token -> 上传至COS -> 轮询发布结果
    pgyer_cos_token_url = "https://www.pgyer.com/apiv2/app/getCOSToken"
    pgyer_build_info_url = "https://www.pgyer.com/apiv2/app/buildInfo"
    // 应用平台类型: android/apk、ios/ipa、harmonyos/hap
    pgyer_build_type = "android"
    // 安装方式: 1=公开, 2=密码安装, 3=邀请安装
    pgyer_build_install_type = "1"

    //更新文案
    update_description = "测试更新文案publish-app"

    // Apk输出路径
    release_apk_path = "${project.rootDir}/demo/build/outputs/apk/release/"
    legu_apk_path = "${project.rootDir}/demo/build/outputs/apk/legu"
    zipalign_apk_path = "${project.rootDir}/demo/build/outputs/apk/zipalign"
    channel_apk_path = "${project.rootDir}/demo/build/outputs/apk/channel"
    signature_apk_path = "${project.rootDir}/demo/build/outputs/apk/signature"

    //乐固
    legu_app_id = readLocalOrEnv("legu.appId", "LEGU_APP_ID")
    legu_app_key = readLocalOrEnv("legu.appKey", "LEGU_APP_KEY")
    legu_jar_path = "${project.rootDir}/build-tools/ms-shield.jar"
    //签名
    sign_jar_path = "${project.rootDir}/build-tools/apksigner.jar"
    //walle
    walle_jar_path = "${project.rootDir}/build-tools/walle-cli-all.jar"
    walle_channel_config = "${project.rootDir}/channel"

    //keystore
    keystore_file_path = resolveExistingFilePath(build_key.keystoreReleaseFilepath, "demo")
    keystore_alias = build_key.keystoreAlias
    keystore_alias_password = build_key.keystoreAliasPSW
    keystore_password = build_key.keystorePSW


    //Webhook路径配置
    wechat_webhook = readLocalOrEnv("notify.wechatWebhook", "NOTIFY_WECHAT_WEBHOOK")
    ding_webhook = readLocalOrEnv("notify.dingWebhook", "NOTIFY_DING_WEBHOOK")
